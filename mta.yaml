_schema-version: "3.2"
ID: ofnreportapp
version: 0.0.1
modules:
- name: ofnreportapp-destination-content
  type: com.sap.application.content
  requires:
  - name: ofnreportapp-destination-service
    parameters:
      content-target: true
  - name: ofnreportapp_html_repo_host
    parameters:
      service-key:
        name: ofnreportapp_html_repo_host-key
  - name: uaa_ofnreportapp
    parameters:
      service-key:
        name: uaa_ofnreportapp-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ofnreportapp_ofnreportapp_html_repo_host
          ServiceInstanceName: ofnreportapp-html5-app-host-service
          ServiceKeyName: ofnreportapp_html_repo_host-key
          sap.cloud.service: ofnreportapp
        - Authentication: OAuth2UserTokenExchange
          Name: ofnreportapp_uaa_ofnreportapp
          ServiceInstanceName: ofnreportapp-xsuaa-service
          ServiceKeyName: uaa_ofnreportapp-key
          sap.cloud.service: ofnreportapp
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: ofnreportapp-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ofnreportapp_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - nusedusgofnreport.zip
      name: nusedusgofnreport
      target-path: resources/
- name: nusedusgofnreport
  type: html5
  path: ofnreport
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ofnreportapp-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ofnreportapp-destination-service
    service-plan: lite
- name: ofnreportapp_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ofnreportapp-html5-app-host-service
    service-plan: app-host
- name: uaa_ofnreportapp
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: ofnreportapp-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
